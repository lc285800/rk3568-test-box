<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RK3568 测试工具盒</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260514-uart-listen" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>RK3568 测试工具盒</h1>
        <p>Web 控制台 MVP</p>
      </div>
      <div class="status">
        <span id="status-dot" class="dot dot-warn"></span>
        <span id="status-text">连接中</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel hero">
        <div>
          <h2>设备概览</h2>
          <p id="summary">正在读取板卡信息...</p>
        </div>
        <button id="refresh">刷新</button>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>系统信息</h2>
          <dl id="system-info" class="kv"></dl>
        </article>

        <article class="panel">
          <h2>外设资源</h2>
          <div id="resources" class="resource-list"></div>
        </article>
      </section>

      <section class="panel">
        <h2>测试任务</h2>
        <form id="task-form" class="task-form">
          <label>
            接口
            <select name="interface">
              <option value="demo">Demo</option>
              <option value="gpio">GPIO</option>
              <option value="i2c">I2C</option>
              <option value="uart">UART</option>
              <option value="rs232">RS232</option>
              <option value="rs485">RS485</option>
              <option value="can">CAN</option>
              <option value="pwm">PWM</option>
              <option value="adc">ADC</option>
            </select>
          </label>
          <label>
            动作
            <input name="action" value="ping" />
          </label>
          <label>
            参数 JSON
            <input name="params" value='{"message":"hello"}' />
          </label>
          <label class="check">
            <input name="dry_run" type="checkbox" checked />
            Dry run
          </label>
          <button type="submit">执行</button>
        </form>
        <p id="task-result" class="hint"></p>
      </section>

      <section class="panel">
        <h2>GPIO 测试</h2>
        <form id="gpio-form" class="task-form gpio-form">
          <label>
            芯片
            <input name="chip" value="/dev/gpiochip0" />
          </label>
          <label>
            Line
            <input name="line" type="number" min="0" max="511" value="0" />
          </label>
          <label class="check">
            <input name="dry_run" type="checkbox" checked />
            Dry run
          </label>
          <label class="check">
            <input name="confirm" type="checkbox" />
            确认写入
          </label>
          <div class="button-row">
            <button type="button" data-gpio-action="info">信息</button>
            <button type="button" data-gpio-action="read">读取</button>
            <button type="button" data-gpio-action="write" data-gpio-value="0">输出低</button>
            <button type="button" data-gpio-action="write" data-gpio-value="1">输出高</button>
          </div>
        </form>
        <p class="hint">真实输出前请取消 Dry run，并勾选确认写入。输出会保持到再次输出同一 Line、服务重启或板卡重启。</p>
        <div id="gpio-result" class="result"></div>
      </section>

      <section class="panel">
        <h2>UART 测试</h2>
        <form id="uart-form" class="task-form uart-form">
          <label>
            <span class="field-label">端口</span>
            <input name="port" value="/dev/ttyS3" />
          </label>
          <label>
            <span class="field-label">波特率</span>
            <select name="baudrate">
              <option value="9600">9600</option>
              <option value="115200" selected>115200</option>
              <option value="230400">230400</option>
              <option value="460800">460800</option>
              <option value="921600">921600</option>
            </select>
          </label>
          <label>
            <span class="field-label">校验</span>
            <select name="parity">
              <option value="N">N</option>
              <option value="E">E</option>
              <option value="O">O</option>
            </select>
          </label>
          <label>
            <span class="field-label">数据</span>
            <input name="data" value="hello" />
          </label>
          <label>
            <span class="field-label">换行</span>
            <select name="line_ending">
              <option value="none">无</option>
              <option value="lf">LF</option>
              <option value="cr">CR</option>
              <option value="crlf">CRLF</option>
            </select>
          </label>
          <label>
            <span class="field-label">读取字节</span>
            <input name="max_read_bytes" type="number" min="1" max="4096" value="256" />
          </label>
          <label class="check">
            <input name="dry_run" type="checkbox" checked />
            Dry run
          </label>
          <label class="check">
            <input name="confirm" type="checkbox" />
            确认发送
          </label>
          <div class="button-row">
            <button type="button" data-uart-action="list">列举</button>
            <button type="button" data-uart-action="listen">监听接收</button>
            <button type="button" data-uart-action="write">发送</button>
            <button type="button" data-uart-action="transceive">发送并等回复</button>
          </div>
        </form>
        <p class="hint">监听接收会等待约 5 秒，请先点击监听再从串口助手发送。真实发送前请取消 Dry run，并勾选确认发送。</p>
        <div id="uart-result" class="result"></div>
      </section>

      <section class="panel">
        <div class="log-head">
          <h2>实时日志</h2>
          <button id="clear-log">清空</button>
        </div>
        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script src="/static/app.js?v=20260514-uart-listen2"></script>
  </body>
</html>
